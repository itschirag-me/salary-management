services:
  db:
    image: postgres:17-alpine
    container_name: salary-management-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: salary_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: salary-management-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres_password
      - DB_DATABASE=salary_management
      - HR_EMAIL=admin@example.com
      - HR_PASSWORD=admin123
      - JWT_SECRET=wsdrbvgerwgwdrgwasdrgwergsdvgswdrfghwersdrvgwsr
      - JWT_EXPIRES_IN=1d
      - DATABASE_URL=postgresql://postgres:postgres_password@db:5432/salary_management?schema=public
    restart: always
    depends_on:
      - db

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
    container_name: salary-management-client
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: always
    depends_on:
      - server

volumes:
  postgres_data:
